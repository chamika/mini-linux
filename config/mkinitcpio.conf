# Minimal initramfs for fast boot on Dell XPS 13 9380.
# Boot-critical drivers (i915, NVMe, ext4, HID) are built into the kernel,
# so MODULES is empty — no module loading needed during early boot.
# The autodetect hook strips this to only hardware-present modules.

MODULES=()
BINARIES=()
FILES=()
# kms hook removed — i915 is built into the kernel (=y), modesetting happens
# automatically without needing the hook to pull in the module early.
HOOKS=(base systemd autodetect modconf block filesystems)

# lz4 decompresses ~2x faster than zstd at the cost of slightly larger image
COMPRESSION="lz4"
COMPRESSION_OPTIONS=(-9)
